# Fixture bundle: ops-002 — Decide whether clean reinstall is needed
#
# The runner provides pre-drift and post-drift configuration state.
# The participant decides whether a clean reinstall is required or
# whether targeted configuration repair suffices.
#
# ⚠ This bundle contains ONLY participant-facing fixture data.
#    Judge notes, answer keys, and oracle material live in
#    oracle/season-001/ and docs/judge-notes-season-001.md.

schema_version: 1
bundle_id: season-001-ops-002-v1
season: season-001
task_id: ops-002
version: 1
description: >
  Configuration snapshots from a gateway node before and after a
  system update that introduced configuration drift.  The
  participant compares the snapshots, identifies the drift, and
  decides whether targeted repair or clean reinstall is the right
  course of action.
dry_run_compatible: true
required: true
files:
  - path: pre-update-config.yaml
    description: >
      Gateway configuration snapshot taken before the system
      update.  Represents the known-good baseline configuration.
    content_type: text/yaml
  - path: post-update-config.yaml
    description: >
      Gateway configuration snapshot taken after the system
      update.  Contains one or more unintentional configuration
      changes (e.g. modified timeout, changed PATH, reset
      resource limit, overwritten systemd unit).
    content_type: text/yaml
  - path: system-status.log
    description: >
      Output of system health commands (systemctl status,
      openclaw status, version checks) from the post-update
      state.
    content_type: text/plain
    optional: true
preparation:
  method: runner_provided
  description: >
    The runner creates two configuration snapshots: one
    baseline and one with intentional drift.  The drift should
    resemble what a real system update might produce (changed
    environment variables, overwritten config file, different
    systemd unit).  Snapshots must not contain real credentials.
  expected_duration_minutes: 10
environment_requirements: []
depends_on: []
