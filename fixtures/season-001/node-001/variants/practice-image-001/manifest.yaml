# Fixture bundle: node-001 official-practice image hardening variant
#
# Participant-facing fixture data only. The answer key lives in
# oracle/season-001/node-001-image-hardening.yaml.

schema_version: 1
bundle_id: season-001-node-001-v2
season: season-001
task_id: node-001
version: 2
description: >
  Official-practice container-image style Node Readiness fixture. The
  participant audits a synthetic Linux image state, identifies scored
  hardening issues, ignores non-scored distractors, and reports the smallest
  safe remediation plan without mutating a live system.
dry_run_compatible: true
required: false
files:
  - path: image-state.yaml
    description: >
      Participant-facing synthetic image inventory with users, services,
      firewall, package, and file-permission state.
    content_type: text/yaml
  - path: score-checks.yaml
    description: >
      Public scoring surface: check IDs, point values, and what kind of
      evidence the participant should cite. Expected pass/fail values are in
      the private oracle.
    content_type: text/yaml
  - path: distractors.yaml
    description: >
      Non-scored observations that should not drive remediation unless the
      participant finds independent evidence.
    content_type: text/yaml
preparation:
  method: bundled
  description: >
    Use the bundled synthetic YAML files directly for source-only practice.
    A future runner may materialize the same state inside a disposable
    container image, but this fixture does not require Docker or live mutation.
  expected_duration_minutes: 3
environment_requirements: []
depends_on:
  - season-001-node-001-v1

