      (Jest, Vitest, or Node built-in test runner).
    content_type: inode/directory
preparation:
  method: generated
  description: >
    The runner creates a minimal TypeScript repo with a known regression.
    A generation script (fixtures/season-001/code-001/generate.sh) can
