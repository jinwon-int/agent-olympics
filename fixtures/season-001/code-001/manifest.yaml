    per participant round so that the regression pattern is not leaked
    across runs.  After generation the repo must pass `npm install` and
    the failing test must reproduce before the fix.
  script_ref: fixtures/season-001/code-001/generate.sh
  expected_duration_minutes: 5
environment_requirements:
  - node >= 18
  - npm
  - git
