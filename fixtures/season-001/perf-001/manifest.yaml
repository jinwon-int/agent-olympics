# Fixture bundle: perf-001 — Measure node throughput
#
# The runner provides a controlled workload definition.  The
# participant runs the workload and reports throughput, latency,
# and resource usage across four phases.
#
# ⚠ This bundle contains ONLY participant-facing fixture data.
#    Judge notes, answer keys, and oracle material live in
#    oracle/season-001/ and docs/judge-notes-season-001.md.

schema_version: 1
bundle_id: season-001-perf-001-v1
season: season-001
task_id: perf-001
version: 1
description: >
  A four-phase controlled workload definition for the Performance
  Trial: repository scan, schema validation, targeted test
  execution, and multi-probe parallel diagnostics.  The runner
  prepares the workload directory before the participant starts.
dry_run_compatible: true
required: true
files:
  - path: workload-definition.yaml
    description: >
      Defines the four workload phases with exact commands,
      measurement points, and expected outputs.  The participant
      executes these phases against the prepared environment
      and records wall time, throughput, and resource metrics.
    content_type: text/yaml
  - path: workload-repo/
    description: >
      Git repository or directory tree against which the
      workload phases run.  Contains source files, schema
      definitions, and test fixtures of moderate size
      (~5-50 MB).
    content_type: inode/directory
preparation:
  method: runner_provided
  description: >
    The runner prepares a workload directory or repository
    containing the source files, schemas, and test fixtures
    needed for the four phases.  The workload-definition.yaml
    specifies exact commands (git operations, schema validation,
    test runs).  For dry runs, a small workload repo (~5 MB)
    suffices.  For competitive rounds, a larger repo (~50 MB)
    produces meaningful performance measurements.
  expected_duration_minutes: 10
environment_requirements:
  - git
depends_on: []
