# Agent Olympics perf-001 Workload Definition
#
# Defines a four-phase, read-only, deterministic workload that simulates
# real agent mission work.  The runner prepares the workload artifacts
# before the participant starts.  The participant executes each phase
# and reports raw measured values using the metric field conventions
# documented below.
#
# Raw measurement fields use a `raw_` prefix to separate them clearly
# from computed/score values.  The oracle determines scoring rules;
# this file only defines what to measure and how to report it.

schema_version: 1
workload_id: wl-perf-001-v1
task_id: perf-001
version: 1
title: "Performance Trial — Baseline Workload"
description: >
  A four-phase controlled workload for measuring node throughput.
  All phases are read-only.  No production services are touched.

phases:
  - id: phase-a-repo-scan
    title: "Phase A — Repository Scan"
    order: 1
    description: >
      Run git operations and file system inspection against the workload
      repository.  Report commit count, file count, line count, and wall
      time for each operation.
    commands:
      - git rev-list --count HEAD
      - find . -type f | wc -l
      - cloc . --json  (or wc -l fallback)
    metric_fields:
      - name: raw_git_commit_count
        type: integer
        description: "Number of commits in the workload repository HEAD history."
      - name: raw_file_count
        type: integer
        description: "Total number of files in the workload directory tree."
      - name: raw_line_count
        type: integer
        description: "Total lines of code in the workload directory tree."
      - name: raw_scan_wall_time_seconds
        type: number
        description: "Wall-clock time in seconds to complete Phase A."

  - id: phase-b-schema-validation
    title: "Phase B — Schema Validation"
    order: 2
    description: >
      Validate all YAML and JSON files under the workload's schemas/
      directory against their schemas.  Report pass/fail per file,
      total validated count, and wall time.
    commands:
      - for f in $(find schemas -name '*.schema.json'); do ...validate...; done
    metric_fields:
      - name: raw_validated_file_count
        type: integer
        description: "Number of files validated against their schemas."
      - name: raw_passed_count
        type: integer
        description: "Number of files that passed schema validation."
      - name: raw_failed_count
        type: integer
        description: "Number of files that failed schema validation."
      - name: raw_validation_wall_time_seconds
        type: number
        description: "Wall-clock time in seconds to complete Phase B."
      - name: raw_validation_latency_ms
        type: number
        description: "Average validation latency per file in milliseconds."

  - id: phase-c-targeted-tests
    title: "Phase C — Targeted Test Execution"
    order: 3
    description: >
      Execute any available test suite (Node.js, shell-based, or
      other).  Report pass/fail count, wall time, and any failures.
    commands:
      - npm test  (or equivalent)
    metric_fields:
      - name: raw_test_count
        type: integer
        description: "Total number of tests executed."
      - name: raw_test_passed
        type: integer
        description: "Number of tests that passed."
      - name: raw_test_failed
        type: integer
        description: "Number of tests that failed."
      - name: raw_test_wall_time_seconds
        type: number
        description: "Wall-clock time in seconds to complete Phase C."
      - name: raw_test_throughput
        type: number
        description: "Tests per second (test_count / wall_time)."

  - id: phase-d-multi-probe
    title: "Phase D — Multi-Probe Parallel Diagnostics"
    order: 4
    description: >
      Run 3–5 independent read-only probes concurrently or sequentially.
      Measure total wall time, estimate sequential time, and report
      speedup factor.  Probes should exercise different system resources:
      disk read, CPU-bound grep, memory alloc + free, network socket
      open/close, and process listing.
    probes:
      - id: probe-diskio
        description: "Sequential read of a large fixture file using dd or cat."
        expected_duration_seconds: 10
      - id: probe-cpu
        description: "Grep across all source files for a rarely-found pattern."
        expected_duration_seconds: 15
      - id: probe-memory
        description: "Allocate and free a moderate buffer using Node.js or Python."
        expected_duration_seconds: 5
      - id: probe-socket
        description: "Open and close a TCP connection to localhost health endpoint."
        expected_duration_seconds: 3
      - id: probe-ps
        description: "List all running processes and count them."
        expected_duration_seconds: 2
    metric_fields:
      - name: raw_probe_count
        type: integer
        description: "Number of probes executed (expected 3–5)."
      - name: raw_sequential_estimate_seconds
        type: number
        description: "Estimated total wall time if all probes ran sequentially."
      - name: raw_total_wall_time_seconds
        type: number
        description: "Actual total wall time for Phase D (may be parallel)."
      - name: raw_speedup_factor
        type: number
        description: "sequential_estimate / total_wall_time. Values >1 indicate parallelism benefit."
      - name: raw_service_stability
        type: string
        enum: [stable, degraded, unreachable]
        description: "Service stability assessment during workload execution."

# Convergence criteria — determined by the oracle/scoring engine, not the participant.
# The participant only records the raw metric values in the result packet.
scoring_conventions:
  - field_prefix: raw_
    description: >
      All fields prefixed with `raw_` carry measured values only.
      Scores are computed separately by the oracle or judge engine.
  - separation_rule: >
      Raw measurement fields must NOT be mixed with computed/synthetic
      score values in the same object.  Score values live in the judge
      record (score_dimensions), not in workload_metrics.
  - example_raw_fields_in_result_packet:
      workload_metrics:
        raw_git_commit_count: 847
        raw_file_count: 1423
        raw_scan_wall_time_seconds: 3.24
        raw_test_throughput: 12.7
        raw_service_stability: stable

# Runner preparation instructions
preparation:
  method: runner_provided
  description: >
    The runner prepares a workload repository at the path referenced by
    the fixture bundle's `files` section.  For dry runs a small repo
    (~5 MB, ~100 commits) suffices.  For competitive rounds a larger
    repo (~50 MB, ~1000 commits) produces meaningful measurements.
  expected_duration_minutes: 10
