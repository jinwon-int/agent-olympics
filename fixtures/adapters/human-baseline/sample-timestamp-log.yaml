    timestamp: "2026-05-29T10:00:00+09:00"
    action: "read_task_envelope"
    description: "Opened the task envelope YAML and read the objective: verify gateway connectivity, TLS certificate, config hash, and log errors."
    duration_seconds: 60

  - sequence: 2
    timestamp: "2026-05-29T10:01:00+09:00"
    action: "create_workspace"
    description: "Created a working directory /tmp/human-ops-001/ for storing logs and results."
