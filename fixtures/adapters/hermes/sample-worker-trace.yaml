# Sample Hermes Worker Trace
#
# This file mimics a trace record that a Hermes worker agent might
# produce after completing its assigned sub-task.  It is a partial
# trace_record that can be validated locally.
#
# The trace follows the trace-record schema format (schemas/trace-record.schema.json)
# but omits fields that only the Hermes commander layer populates.

schema_version: 1
trace_id: "trc-s3-worker-01"
parent_workflow_id: "wf-ops-001-demo"
step_id: "s3-log-inspection"
worker_id: "worker-gamma"

timeline:
  - event: "task_received"
    timestamp: "2026-05-29T09:00:05+09:00"
    detail:
      envelope_ref: "env-ops-001-v1"
      step_description: "Inspect gateway logs for 5xx errors"

  - event: "tool_invocation_start"
    timestamp: "2026-05-29T09:00:06+09:00"
    detail:
      tool_name: "read_file"
      arguments:
        path: "/var/log/openclaw/gateway.log"

  - event: "tool_invocation_end"
    timestamp: "2026-05-29T09:00:07+09:00"
    detail:
      tool_name: "read_file"
      status: "success"
      output_truncated: true
      bytes_read: 16384

  - event: "analysis_start"
    timestamp: "2026-05-29T09:00:08+09:00"
    detail:
      method: "grep_error_pattern"
      pattern: 'HTTP/1\.[01]" 5\d{2} '

  - event: "analysis_end"
    timestamp: "2026-05-29T09:00:09+09:00"
    detail:
      matching_lines: 3
      error_count: 3
      severity_levels:
        - "502"
        - "502"
        - "504"
      below_threshold: true

  - event: "result_produced"
    timestamp: "2026-05-29T09:00:10+09:00"
    detail:
      output_ref: "s3-log-inspection"
      evidence_ref: "ev-log-s3-worker-01"

findings:
  - finding_id: "f-001"
    rule: "error_threshold_check"
    severity: "info"
    description: "Gateway log contains 3 x 5xx errors in the last 24 hours"
    recommendation: "Monitor trend; current count is within acceptable threshold (< 10)"
    passed: true

classification: "complete"
