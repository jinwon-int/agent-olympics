  base_dir: evidence/dry-run/execute/
  per_task:
    - result-packet.yaml    # v2 result packet from stub adapter
    - trace.yaml            # v1 trace record from stub adapter
    - evidence-bundle.yaml  # v1 evidence bundle from stub adapter
    - run.yaml              # Run metadata (exit code, artifacts)
    - envelope-copy.yaml    # Copy of the input envelope
  summary:
    path: evidence/dry-run/execute/execution-summary.json
    format: json

# Post-execution gates to verify output integrity
