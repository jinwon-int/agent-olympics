# Agent Olympics 2026 — Official Dry-Run Execution Manifest
#
# Source-only execution contract for Season 001 dry-run tasks.
# Selected tasks are run using fixture bundles and the stub adapter,
# producing sample result packets, traces, and evidence bundles
# without live service mutation.
#
# Reference: docs/dry-run-readiness.md §5 (Broker Finalizer) and §6
#            runners-guide.md §3 (Dry-run execution)
#
# Constraints:
#   - No production deploy, Gateway/broker/worker restart or reload
#   - No live provider/Telegram canary
#   - No production DB mutation/prune/migration
#   - No manual Terminal Brief ACK/replay
#   - No historical outbox replay
#   - No release/tag/npm publish
#   - No credential movement/change/value disclosure
#   - Repo visibility unchanged, no history rewrite
#   - No issue close/finalizer comment execution
#   - No PR merge or force-push without separate operator approval

schema_version: 1
manifest_id: dry-run-execution-20260530-v1
manifest_type: dry_run_execution
season: season-001
title: "Agent Olympics 2026 — Season 001 Official Dry Run"
description: >
  Source-only dry run executing selected Season 001 tasks through the
  stub adapter using fixture bundles.  No live service calls, no
  production node access, no credential exposure.  Output goes to
  evidence/dry-run/execute/ for subsequent gate verification.
run_id: agent-olympics-team1-official-dryrun-20260530T0902KST
operator: sogyo
operator_agent_id: sogyo
execution_class: source-only
live_mutation: false
parent_issue: "https://github.com/jinwon-int/agent-olympics/issues/146"
assigned_issue: "https://github.com/jinwon-int/agent-olympics/issues/147"
created_at: "2026-05-30T09:02:00+09:00"

# Execution mode: how the dry runner should process each task
execution_mode:
  adapter: stub-adapter
  generator: scripts/stub-adapter.js
  output_dir: evidence/dry-run/execute/
  run_dir_template: evidence/dry-run/execute/{task_id}/
  exit_on_failure: false
  parallel: false
  keep_intermediates: true

# Readiness gates to verify before execution
