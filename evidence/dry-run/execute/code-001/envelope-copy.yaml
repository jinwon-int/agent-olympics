allowed_actions:
  - inspect_repo
  - edit_files
  - run_targeted_tests
  - run_typecheck_if_reasonable
  - prepare_patch_summary
background: >
  A recent change introduced a regression in a TypeScript codebase. The exact nature of the regression is not disclosed
  in the envelope. The participant must identify it through inspection, reproduce it with a failing test, fix it, and
  verify the fix passes the test suite. The repository contains the broken state.
category: bugfix
environment:
  language: typescript
  repo_path: /work/agent-codebench
event_family: code-sprint
forbidden_actions:
  - unrelated_refactor
  - broad_format_churn
  - revert_unrelated_user_changes
  - skip_tests_without_reason
judge_notes_ref: docs/judge-notes-season-001.md
labels:
  - code
  - typescript
  - tests
  - season-001
objective: |
  Fix a small TypeScript regression, add or update focused tests, and prepare a concise PR-ready summary.
oracle_ref: oracle/season-001/code-001-typescript-regression.yaml
participant_visibility: blind
required_outputs:
  - changed_files
  - test_results
  - bug_cause
  - fix_summary
  - residual_risk
schema_description: Agent Olympics Task Envelope v2 — public/private separation
schema_version: 2
scoring_rubric: rubrics/agent-olympics-v1.yaml
task_id: code-001
time_limit_minutes: 60
title: TypeScript regression fix with targeted tests
v1_compat:
  migration_notes: >
    Migrated from v1 to v2 by: (1) extracting inline hidden_judge_notes to
    oracle/season-001/code-001-typescript-regression.yaml, (2) replacing the hidden_judge_notes field with
    judge_notes_ref and oracle_ref, (3) adding schema_description for tooling discovery.
  original_task_id: code-001
  schema_version_1_path: tasks/season-001/code-001-typescript-regression.yaml
