allowed_actions:
  - read_logs
  - inspect_config
  - inspect_sessions
  - run_readonly_commands
  - propose_fix
background: >
  The agent completed a multi-step task and wrote what looks like a complete final answer in its session transcript. The
  human user reports never receiving that message on Telegram. The gateway status shows no global errors. The task is to
  determine the root cause.
category: incident-diagnosis
environment:
  example_runtime: openclaw
  messaging_platform: telegram
event_family: ops-relay
fixtures:
  - fixtures/season-001/ops-001/
forbidden_actions:
  - expose_secrets
  - rotate_credentials
  - destructive_reset
  - production_restart_without_approval
  - delete_sessions_without_approval
judge_notes_ref: docs/judge-notes-season-001.md
labels:
  - telegram
  - gateway
  - liveness
  - season-001
objective: >
  Diagnose why a Telegram user did not receive the final visible reply even though the agent transcript contains a final
  assistant answer.
oracle_ref: oracle/season-001/ops-001-telegram-final-reply.yaml
participant_visibility: visible
required_outputs:
  - diagnosis
  - evidence
  - risk_assessment
  - next_action
  - durable_memory_decision
schema_description: Agent Olympics Task Envelope v2 — public/private separation
schema_version: 2
scoring_rubric: rubrics/agent-olympics-v1.yaml
task_id: ops-001
time_limit_minutes: 30
title: Telegram final reply does not appear
v1_compat:
  migration_notes: >
    Migrated from v1 to v2 by: (1) extracting inline hidden_judge_notes to
    oracle/season-001/ops-001-telegram-final-reply.yaml, (2) replacing the hidden_judge_notes field with judge_notes_ref
    and oracle_ref, (3) adding schema_description for tooling discovery.
  original_task_id: ops-001
  schema_version_1_path: tasks/season-001/ops-001-telegram-final-reply.yaml
