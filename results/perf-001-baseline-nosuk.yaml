findings:
  - claim: >
      Nosuk a2a-runner baseline completes all four Performance Trial phases
      within the extended time window (32 min wall time vs 90 min limit).
    evidence: [ev-git-count, ev-cloc, ev-schema, ev-test, ev-probes]
    confidence: high
  - claim: >
      Schema validation throughput is 19.72 files/second — 32% faster than
      medium-vps (14.97/s) and 2.4x faster than small-vps (8.19/s).
    evidence: [ev-schema]
    confidence: high
  - claim: >
      Six parallel probes achieve 3.28x speedup over sequential — strong
      parallelism benefit on 4 vCPU with 12 GB memory overhead.
    evidence: [ev-probes]
    confidence: high
  - claim: >
      Test throughput (3.95 tests/s) is 44% higher than medium-vps (2.74/s)
      and 3.3x higher than small-vps (1.18/s), driven by NVMe I/O and
      memory headroom for test parallelism.
    evidence: [ev-test]
    confidence: high
  - claim: >
      Raw measurements across all three profiles show predictable hardware
      scaling: small→medium→a2a-runner improvement is consistent with core
      count, memory, and storage class differences.
    evidence: [ev-schema, ev-test, ev-probes]
    confidence: high
  - claim: >
      Scored values provide hardware-agnostic comparison: efficiency_score
      (0.87) reflects the a2a-runner's advantage over medium-vps baseline
      after normalizing for CPU/memory.
    evidence: [ev-test, ev-probes, ev-schema]
    confidence: medium

risks:
  - A2A relay dependency adds latency variability — coordination heartbeat may
    be affected by broker-side contention during concurrent rounds.
  - 12 GB memory is sufficient for this workload but may be limiting for
    larger repos with multiple concurrent probes.
  - A2A runner class assumes dedicated NVMe; shared-storage environments may
    produce different raw_measurements.

outputs:
  workload_summary: >
    Nosuk a2a-runner (4 vCPU, 12 GB RAM, dedicated NVMe) completed all four
    workload phases in 32 minutes wall time.  Raw measurements show the
    a2a-runner class is 20-44% faster than medium-vps across all phases
    due to NVMe storage and memory headroom.  The normalization divisor
    (cpu_cores / 4 * memory_gb / 8 = 1.5) produces an efficiency_score of
    0.87, indicating the extra resources yield proportionally less than
    linear speedup — consistent with Amdahl's law on this workload.
  hardware_profile: >
    4 vCPU Intel Xeon Platinum 8475C, 12 GB RAM, dedicated NVMe storage,
    Ubuntu 24.04.  A2A runner class with 3 concurrent runner slots.
  configuration_profile: >
    Direct model routing, Telegram-visible liveness, resource limits
    configured, concurrency_limit=3, durable memory enabled, subagent
    delegation allowed.
  workload_metrics: >
    See raw_measurements field above for pre-normalization values and
    scored_values field for normalized cross-profile metrics.
  stability_assessment: >
    Gateway remained stable.  A2A relay heartbeat confirmed broker
    connectivity.  No reconnection or timeout events during any phase.
  tuning_recommendations: >
    1. Increase concurrency_limit to 4 for Phase D to fully utilise 4 vCPU.
    2. Consider probe count reduction to 5 (current 6 probes on 4 vCPU show
       diminishing returns — 3.28x vs theoretical 4x).
    3. Parallelise Phase B validation for additional CPU-bound improvement.
    4. This profile is the recommended reference for A2A coordination tasks.
