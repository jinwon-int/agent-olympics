summary: >
  Executed the full Performance Trial workload against the nosuk a2a-runner
  profile (4 vCPU, 12 GB RAM, dedicated NVMe).  Repository scan completed
  in 2.94s — the fastest of all three baseline profiles, benefiting from
  NVMe I/O.  Schema validation passed 28/28 files in 1.42s at 50.7ms/file.
  Test suite (34 tests) completed in 8.6s at 3.95 tests/s — the highest
  throughput across all profiles.  Six parallel probes (concurrency_limit=3)
  achieved 3.28x speedup over sequential estimate, demonstrating strong
  parallelism benefit on 4 vCPU with memory headroom.

