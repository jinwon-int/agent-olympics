  evidence: >-
    fixtures/season-001/ops-002/pre-update-config.yaml: Known-good baseline: final_reply_timeout_seconds=30,
    memory_mb=1024, open_files=4096, restart_policy=on-failure, PATH_POLICY=managed

    fixtures/season-001/ops-002/post-update-config.yaml: Drifted state: final_reply_timeout_seconds=5,
    memory_mb=512, open_files=1024, restart_policy=always, PATH_POLICY=reset-by-package-update

    fixtures/season-001/ops-002/system-status.log: Gateway status degraded, systemd unit active, recent
    package refresh changed unit override and resource limits, observed symptom: final replies intermittently
    time out after 5 seconds
  installation_integrity_assessment: >-
    [hermes-adapter:orchestrator/ops] Output for installation_integrity_assessment. Status: completed.
    Commander report synthesized.
  recommendation: >-
    [hermes-adapter:orchestrator/ops] Output for recommendation. Status: completed. Commander report
    synthesized.
  rollback_or_noop_rationale: >-
    [hermes-adapter:orchestrator/ops] Output for rollback_or_noop_rationale. Status: completed. Commander
    report synthesized.
  runtime_path: >-
    [hermes-adapter:orchestrator/ops] Output for runtime_path. Status: completed. Commander report
    synthesized.
  workflow:
    step_count: 4
    worker_count: 1
    worker_profiles:
      - local-hermes-cli
    workflow_id: wf-ops-002-sogyo-2026-06-11T13-19-04-86a9fa
  diagnosis: >-
    Configuration drift induced by system package update. Three harmful parameter changes: (1)
    final_reply_timeout_seconds 30→5 — direct root cause of the 'replies time out after 5 seconds' symptom;
    (2) memory_mb 1024→512 — can cause OOM or GC stalls under load; (3) open_files 4096→1024 — risks 'too many
    open files' errors. Two additional non-critical drifts: restart_policy on-failure→always, PATH_POLICY
    managed→reset-by-package-update. The gateway service itself is active but degraded per system-status.log.
    No signs of binary corruption, segfault, or missing runtime files anywhere in the fixture evidence.
  risk_assessment: >-
    Risk is low. All changes are in runtime configuration, not in the binary or installation integrity.
    Restoring the pre-update config values is a safe, reversible operation. No destructive action (clean
    reinstall, state deletion, binary replacement) is required. The gateway service is active — restart after
    config repair carries minimal service interruption risk. The one safety note: if the package update's
    PATH_POLICY reset also altered the runtime binary path, verify `which openclaw` or `which hermes` before
    restart.
  next_action: >-
    Apply a targeted config repair: edit the post-update gateway config to restore (a)
    final_reply_timeout_seconds: 30, (b) memory_mb: 1024, (c) open_files: 4096, (d) restart_policy:
    on-failure, (e) PATH_POLICY: managed. Then systemctl restart the gateway service and verify final-reply
    delivery returns to normal. If the config file was fully overwritten rather than partial-drifted, restore
    from the pre-update config backup directly. Rollback: if the targeted fix does not resolve the symptom,
    the config changes can be reverted with no state loss — reinstall remains a last resort, not next action.
  durable_memory_decision: >-
    Record this diagnostic pattern as durable memory: system package updates can silently overwrite gateway
    runtime configs (timeout, memory, file descriptors, path policy). The triage template is: compare pre/post
    config snapshots → identify specific drifted parameters → targeted repair. Only escalate to reinstall if
    binary checksum fails or core files are missing. This pattern applies across both OpenClaw and Hermes
    runtimes.
