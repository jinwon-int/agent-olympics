      - ev-worker-traces
    confidence: high
  - claim: >-
      Secondary factors: memory limit halved (1024→512 MB) and open_files quartered (4096→1024) Sources:
      pre-update-config.yaml: memory_mb: 1024, open_files: 4096; post-update-config.yaml: memory_mb: 512,
      open_files: 1024
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      No evidence of binary corruption, checksum mismatch, or missing installation files Sources:
      system-status.log shows gateway is active (not crashed/segfaulted); No checksum failures or missing-file
      errors in any fixture
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      Targeted config repair is safe and reversible; config restore from pre-update baseline is one-line
      operation Sources: pre-update-config.yaml contains complete known-good parameter set;
      post-update-config.yaml has same structure — parameter-level restoration is straightforward
    evidence:
