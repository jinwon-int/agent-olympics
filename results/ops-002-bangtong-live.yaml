findings:
  - claim: >-
      Clean reinstall is NOT justified — the binary and installation are intact; the gateway is active and
      only configuration values were reset by the package update Sources: system-status.log: 'systemd unit:
      active' and 'gateway status: degraded' confirms service is running, not crashed or corrupted;
      post-update-config.yaml shows all gateway structural fields (service_manager, mode, OPENCLAW_HOME)
      unchanged; only operational parameters differ
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      final_reply_timeout_seconds reduced from 30 to 5 is the direct trigger for missing/slow Telegram replies
      Sources: post-update-config.yaml: final_reply_timeout_seconds: 5; system-status.log: 'final replies
      intermittently time out after 5 seconds' directly matches the config value; pre-update-config.yaml:
      final_reply_timeout_seconds: 30 was the working baseline
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      Memory halved to 512MB and open_files reduced to 1024 are secondary contributing factors that may
      amplify the delivery problem under load Sources: pre-update-config.yaml: memory_mb: 1024, open_files:
      4096; post-update-config.yaml: memory_mb: 512, open_files: 1024
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: medium
  - claim: >-
      PATH_POLICY change from 'managed' to 'reset-by-package-update' indicates environment variable management
      was disrupted, which could cause library path skew or dependency resolution failures Sources:
      pre-update-config.yaml: PATH_POLICY: managed; post-update-config.yaml: PATH_POLICY:
      reset-by-package-update
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: medium
  - claim: >-
      Targeted config restoration is sufficient — no reinstall, no binary replacement, no state deletion
      required Sources: system-status.log confirms gateway is running and only config values drifted; All five
      drift points are operational parameters settable in config files, not compiled-in or requiring
      reinstall; manifest.yaml describes drift as intentional configuration changes resembling system-update
      side effects, not binary corruption
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
