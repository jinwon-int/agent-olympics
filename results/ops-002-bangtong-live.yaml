    workflow_id: wf-ops-002-bangtong-2026-06-11T16-18-33-3e1122
  mission_parse_fallback: false
  diagnosis: >-
    Configuration drift from package refresh, not binary corruption. Post-update config values differ from
    baseline in five fields: PATH_POLICY changed from 'managed' to 'reset-by-package-update', memory_mb halved
    from 1024 to 512, open_files quartered from 4096 to 1024, restart_policy changed from 'on-failure' to
    'always', and final_reply_timeout_seconds reduced from 30 to 5. The 5-second final reply timeout is the
    direct cause of Telegram delivery failures — replies that take longer than 5 seconds to assemble are cut
    off before delivery. Gateway binary is intact (systemd unit is active), service is running, no segfaults
    or checksum mismatches observed. Targeted config restoration is the correct fix.
  risk_assessment: >-
    Low risk if treated with targeted config restore. No secrets exposed, no state deleted, no service restart
    needed beyond a controlled reload. The degraded state is non-destructive — the gateway is still active and
    processing inbound traffic; only final-reply delivery is affected. Halved memory (512MB) and reduced file
    descriptors (1024) create secondary risk of resource exhaustion under load. Clean reinstall is actively
    harmful: it destroys the known-good binary and state without addressing the actual config-level problem.
  next_action: >-
    Restore the five drifted config values to their pre-update baseline. Either: (a) revert the gateway config
    file from backup (pre-update-config.yaml), or (b) apply targeted edits: set PATH_POLICY=managed,
    memory_mb=1024, open_files=4096, restart_policy=on-failure, final_reply_timeout_seconds=30. Then perform
    an approved service reload (not restart — a SIGHUP or systemctl reload if supported). Verify remediation
    by checking system-status output shows 'healthy' instead of 'degraded' and confirm
    final_reply_timeout_seconds is back to 30.
  durable_memory_decision: >-
    Do NOT persist as durable memory. This is synthetic fixture data prepared for an Agent Olympics smoke-tier
    exercise, not a real production incident. The fixture manifest explicitly states this is runner-provided
    configuration snapshots with intentional drift. Committing this to durable memory would pollute the
    agent's knowledge base with fictional incident data.
