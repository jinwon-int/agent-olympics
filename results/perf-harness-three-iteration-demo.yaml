# Multi-Iteration Baseline Demo — perf-001 (Harness)
#
# This demonstration report simulates a three-iteration run of the perf-001
# workload and illustrates the raw/scored separation, iteration-to-iteration
# variance, and machine/human visible caveats required for comparability.
#
# The values are realistic approximations based on the existing baseline
# packets (perf-001-baseline-nosuk.yaml, perf-001-baseline.yaml).
# A real harness run would replace these with live instrumented values.
#
# Purpose:
#   Illustrate the repeatable baseline harness/report path for the
#   Performance Trial (issue #140).  Three iterations demonstrate:
#     - Raw measurements per iteration (raw_-prefixed)
#     - Scored values per iteration (normalized, cross-hardware fair)
#     - Summary statistics (mean, min, max, stddev, CV)
#     - Machine/human visible caveats

schema_version: 2
packet_id: pkt-perf-harness-three-iteration-demo
task_id: perf-001
agent_id: perf-harness-demo
runtime: source-harness-demo
adapter: none
division: source-only
validity: valid
publishable: true
redaction_policy: "source-only harness demo; no live hostnames, IPs, credentials, or user-private values included"

hardware_profile:
  cpu_class: a2a-runner
  cpu_cores: 4
  cpu_model: Intel Xeon Platinum 8475C
  memory_gb: 12
  storage_class: nvme-dedicated
  os_family: linux

harness_config:
  iterations: 3
  probe_mode: sequential
  cache_policy: default

# ---------------------------------------------------------------------------
# Iterations — each has raw_measurements and scored_values in separate
# namespaces.  No field name collision between them (raw_-prefixed vs.
# _score-suffixed).
# ---------------------------------------------------------------------------
