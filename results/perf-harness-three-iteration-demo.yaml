# ---------------------------------------------------------------------------
# Harness-level caveats — visible to both machines and humans
# ---------------------------------------------------------------------------
harness_caveats:
  - id: harness-execution-mode
    severity: info
    message: >
      Source-only harness: 3 iterations of perf-001 workload.  Raw
      measurements include local container overhead.  Scored values use
      the standard normalization documented in docs/performance-scoring.md.
    machine_key: execution_mode
    machine_value: source-only-harness
  - id: scored-separation
    severity: info
    message: >
      Raw measurements and scored values are in separate namespaces per
      iteration.  No field name collision: raw_-prefixed fields appear
      only in raw_measurements; _score-suffixed fields appear only in
      scored_values.
    machine_key: separation_status
    machine_value: clean
  - id: iteration-variance
    severity: info
    message: >
      Coefficients of variation (CV) across all metrics are below 0.05,
      indicating stable measurements.  Iteration 1 shows higher wall_time
      due to cold cache.  Subsequent iterations converge.
    machine_key: variance_level
    machine_value: low

# ---------------------------------------------------------------------------
# Raw/Scored separation guarantee
# ---------------------------------------------------------------------------
raw_vs_scored_separation:
  status: clean
  description: >
    All raw_-prefixed fields isolated to raw_measurements; all normalized
    values in scored_values.  No cross-contamination detected across any
    of the three iterations.

