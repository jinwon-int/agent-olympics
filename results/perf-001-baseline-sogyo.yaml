findings:
  - claim: sogyo (OpenClaw, openstack mode) completes all four workload phases within the 60-minute time limit.
    evidence: [ev-adapter-init, ev-git-count, ev-cloc, ev-schema, ev-test, ev-probes, ev-packet-assembly]
    confidence: high
  - claim: Schema validation throughput is 14.97 files/second with zero errors — consistent with OpenClaw direct-routing performance.
    evidence: [ev-schema]
    confidence: high
  - claim: Five parallel probes achieve 2.46x speedup — moderate parallelism benefit on 4-core host with concurrency_limit=4.
    evidence: [ev-probes]
    confidence: high
  - claim: Adapter overhead (session init + packet assembly) adds ~1.6s to total execution time — negligible for 60-minute envelopes.
    evidence: [ev-adapter-init, ev-packet-assembly]
    confidence: high
  - claim: All services remained stable under concurrent workload.
    evidence: [ev-stability, ev-probes]
    confidence: high
  - claim: No performance bottleneck was dominated by hardware limits at this workload scale.
    evidence: [ev-cloc, ev-schema, ev-test, ev-probes]
    confidence: medium

risks:
  - OpenClaw adapter overhead (~1.6s) scales with result-packet complexity; large evidence bundles may increase assembly time.
  - Medium class (8 GB) may become CPU-bound for multi-probe phases with >5 concurrent probes.
  - Single-threaded validation (Phase B) does not benefit from additional cores — parallel validation would improve throughput.
  - sogyo agent-id configuration (openstack mode) grants full tool access; a misconfigured adapter could exceed forbidden-action boundaries.

