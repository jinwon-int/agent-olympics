    근본 원인은 시스템 패키지 업데이트가 systemd 유닛 오버라이드와 리소스 제한을 덮어쓰면서 발생한 구성 드리프트다. 직접적 원인 파라미터:
    final_reply_timeout_seconds가 30초에서 5초로 감소 → Telegram 최종 응답이 5초 후 타임아웃됨. 2차 요인: memory_mb 1024→512 (OOM
    위험), open_files 4096→1024 (파일 디스크립터 고갈 위험), restart_policy on-failure→always, PATH_POLICY
    managed→reset-by-package-update. 바이너리 설치는 손상되지 않았으며(systemd unit active, segfault/crash 없음), 게이트웨이는
    degraded 상태로 동작 중. 클린 재설치는 과잉 대응이며 표적 구성 복원(targeted config repair)으로 충분.
  risk_assessment: >-
    안전 위험 낮음. 모든 진단은 읽기 전용 파일 검사로 수행되었으며 프로덕션 변경 없음. 클린 재설치를 배제함으로써 불필요한 서비스 중단과 운영 리스크를 회피. 구성 복원은 최소 침습적이며,
    복원 전 현재(표류된) 구성의 백업을 통해 롤백 경로 확보 가능. 추후 동일 패키지 업데이트 시 구성이 다시 덮어쓰일 수 있으므로 구성 파일 버전 고정(pinning) 또는
    pre/post-update checksum 검증 자동화 필요.
  next_action: >-
    1) post-update-config.yaml을 post-update-config.yaml.drifted로 백업, 2) pre-update-config.yaml의 5개 편차 파라미터 값을
    post-update-config.yaml에 복원 (restart_policy=on-failure, final_reply_timeout_seconds=30, memory_mb=1024,
    open_files=4096, PATH_POLICY=managed), 3) 운영자 승인 후 systemctl daemon-reload 및 systemctl restart
    openclaw-gateway, 4) 복원 후 Telegram 전송 테스트로 timeout 해소 확인, 5) 향후 패키지 업데이트 시 구성 덮어쓰기 방지를 위해
    /etc/systemd/system/openclaw-gateway.service.d/override.conf 보호 또는 구성 checksum 모니터링 자동화 배포.
  durable_memory_decision: >-
    persist: yes. Agent Olympics ops-002는 실제 운영에서 빈발하는 시나리오(패키지 업데이트 후 구성 드리프트)의 정식 진단 패턴을 확립한다. 가족위키에 '운영 진단
    패턴: 패키지 업데이트 후 구성 드리프트'로 기록하여 향후 유사 증상 발생 시 재설치 대신 구성 비교를 우선 수행. 핵심 인사이트: (a) systemctl status로 설치 상태 확인 후
    구성 비교가 첫 단계, (b) timeout/memory/open_files/PATH/restart_policy가 패키지 업데이트로 초기화되는 5대 취약 파라미터, (c) 재설치는 바이너리
    손상 증거(checksum mismatch, segfault)가 있을 때만 정당화.
