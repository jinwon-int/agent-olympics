    worker_count: 1
    worker_profiles:
      - local-hermes-cli
    workflow_id: wf-ops-002-dungae-2026-06-11T16-14-07-a19886
  mission_parse_fallback: false
  diagnosis: >-
    Root cause: configuration drift introduced by a system package update. The package refresh overwrote the
    gateway unit override, resetting four critical parameters: (1) final_reply_timeout_seconds 30→5 (primary
    symptom driver — Telegram replies time out after 5s), (2) memory_mb 1024→512 (halved resource ceiling),
    (3) open_files 4096→1024 (quartered fd limit), (4) restart_policy on-failure→always (changed restart
    behavior), and (5) PATH_POLICY managed→reset-by-package-update (potential binary path skew). Zero evidence
    of binary checksum failure, segfault, or missing core files. The gateway binary itself is intact; the
    service is active but degraded.
  risk_assessment: >-
    Low risk. No secrets exposed in any fixture. No binary corruption or crash evidence. The fix is a
    non-destructive config edit with a clear rollback path: the pre-update-config.yaml serves as the rollback
    target. The gateway service remains active (systemd unit=active), so no production outage exists — only
    degraded Telegram delivery. Targeted config repair carries near-zero risk of making things worse.
  next_action: >-
    Restore the post-update gateway configuration to pre-update baseline values. Specific commands: (1) Set
    delivery.final_reply_timeout_seconds back to 30, (2) Set gateway.limits.memory_mb to 1024, (3) Set
    gateway.limits.open_files to 4096, (4) Set gateway.restart_policy to on-failure, (5) Set
    gateway.env.PATH_POLICY to managed. Then reload the gateway: systemctl reload openclaw-gateway or
    equivalent. Verify with: openclaw gateway status. If reload does not take effect, a restart may be needed
    but only after confirming the config file is correctly written.
  durable_memory_decision: >-
    Yes, this warrants durable memory capture. The diagnostic pattern — comparing pre/post-update config
    snapshots before assuming binary corruption — should be documented as a standard runbook entry.
    Additionally, the specific config keys vulnerable to package-update overwrite (timeout, memory limits, fd
    limits, restart_policy, PATH_POLICY) should be added to a pre-update config backup checklist. This
    prevents future operators from jumping to clean reinstall when a simple config diff would suffice.
