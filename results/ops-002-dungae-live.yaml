  evidence: >-
    fixtures/season-001/ops-002/pre-update-config.yaml: Known-good baseline: final_reply_timeout_seconds=30,
    memory_mb=1024, open_files=4096, restart_policy=on-failure, PATH_POLICY=managed

    fixtures/season-001/ops-002/post-update-config.yaml: Post-update drifted state:
    final_reply_timeout_seconds=5, memory_mb=512, open_files=1024, restart_policy=always,
    PATH_POLICY=reset-by-package-update

    fixtures/season-001/ops-002/system-status.log: Gateway status degraded. Systemd unit active. Log
    explicitly states: 'package refresh changed unit override and resource limits' and 'final replies
    intermittently time out after 5 seconds' — directly corroborating the timeout drift as symptom cause

    fixtures/season-001/ops-002/manifest.yaml: Fixture manifest confirms this is a configuration-drift
    scenario: 'The participant compares the snapshots, identifies the drift, and decides whether targeted
    repair or clean reinstall is the right course of action'
  installation_integrity_assessment: >-
    [hermes-adapter:orchestrator/ops] Output for installation_integrity_assessment. Status: completed.
    Commander report synthesized.
  recommendation: >-
    [hermes-adapter:orchestrator/ops] Output for recommendation. Status: completed. Commander report
