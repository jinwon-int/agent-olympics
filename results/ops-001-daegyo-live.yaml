outputs:
  diagnosis: >-
    Root cause: source-visible reply release failure. The agent session completed with
    final_reply_visible_in_transcript=true, meaning the final answer was rendered successfully inside the
    agent's session transcript. However, the gateway journal shows final_reply source_visible=true
    delivery_request_id=null — the runtime never created a delivery request for the Telegram outbound channel.
    The Telegram delivery log confirms this: status=missing_delivery_record at 10:18:34, followed by
    retry_count=0 api_message_id=null at 10:18:35. The configuration had source_transcript_only_mode: false
    and final_reply_requires_visible_send: true, so the system was correctly configured to deliver — the
    failure is in the runtime's delivery-request generation layer. Common trigger: stale embedded-run recovery
    where the reply message object was built without a valid Telegram channel target or thread ID after
    session replay, causing the outbound path to silently skip the send rather than erroring visibly.
  durable_memory_decision: >-
    YES — document this diagnosis at the fleet level under 'Telegram delivery diagnostic patterns:
    source-visible reply release failure'. The key indicator to monitor: gateway journal line with final_reply
    source_visible=true AND delivery_request_id=null simultaneously. Add a monitoring check that fires when
    this pattern appears, and record the debug procedure (check gateway journal for delivery_request_id, then
    telegram-delivery.log for missing_delivery_record / null api_message_id). This pattern will recur if the
    embedded-run recovery path is triggered again by restart or session replay.
  evidence: >-
    fixtures/season-001/ops-001/gateway-journal.log:4: final_reply source_visible=true
    delivery_request_id=null — agent answer exists in transcript but no delivery request was created

    fixtures/season-001/ops-001/gateway-journal.log:5: status=completed final_reply_visible_in_transcript=true
    — transcript-level rendering succeeded

    fixtures/season-001/ops-001/telegram-delivery.log:3: message_ref=final-reply
    status=missing_delivery_record — Telegram delivery record missing at outbound attempt time

    fixtures/season-001/ops-001/telegram-delivery.log:4: retry_count=0 api_message_id=null — no retries
    attempted, Telegram API returned no message ID (message never sent)

    fixtures/season-001/ops-001/config-snapshot.yaml:5-8: source_transcript_only_mode=false and
    final_reply_requires_visible_send=true — config expected actual delivery, not transcript-only

    fixtures/season-001/ops-001/gateway-journal.log:3: tool=diagnostic action=read_delivery_queue result=empty
    — delivery queue was empty 2 minutes before completion, no pending messages

    fixtures/season-001/ops-001/variants/heldout-001/telegram-delivery.log:2-3: Held-out variant confirms a
    separate root cause (stale reply parent) — the main fixture is distinct, showing no delivery request at
    all rather than a rejected one
  next_action: >-
    1) Reproduce the failure in a staging/dev Hermes session: send a test message and verify the gateway
    journal shows a non-null delivery_request_id. 2) If reproducible, inspect the reply-release code path in
    the runtime (likely openclaw message-bus or Hermes gateway Telegram plugin) for the condition where
    delivery_request_id is set to null despite source_visible=true. 3) Patch the embedded-run recovery or
    session-replay block to ensure reply objects carry a valid channel target before proceeding to the
    telegram_outbound handler. 4) Add a delivery-probe monitor that periodically sends a ping message and
    verifies delivery_request_id is non-null and api_message_id is assigned within the retry window.
  risk_assessment: >-
    No destructive actions taken. All files are synthetic/anonymised fixtures with no real credentials. No
    production services were touched. Safe to proceed with read-only escalation path: verify current
    production runtime's reply-release logic for the Telegram channel before attempting any fix. Risk of
    applying a patch without narrowing the exact code path — recommend reproducing the failure with a dry-run
    delivery probe first.
  workflow:
    step_count: 4
    worker_count: 1
    worker_profiles:
      - local-hermes-cli
    workflow_id: wf-ops-001-daegyo-2026-06-11T16-37-01-a607cb
