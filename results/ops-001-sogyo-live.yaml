      agent transcript에는 최종 응답이 정상 기록되었으나 Telegram 사용자에게 전달되지 않음 Sources: gateway-journal.log:4-5;
      telegram-delivery.log:3
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      root cause는 source-visible reply release failure: runtime이 delivery request를 생성하지 않음 Sources:
      gateway-journal.log:4 delivery_request_id=null; telegram-delivery.log:4 api_message_id=null
      retry_count=0; config-snapshot.yaml:5 final_reply_requires_visible_send=true
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: 'delivery pipeline 자체는 정상이며 inbound/typing indicator는 정상 처리됨 Sources: telegram-delivery.log:1-2 status=ok'
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      retry mechanism이 작동하지 않은 이유는 delivery request 자체가 queue에 enqueue되지 않았기 때문 Sources: gateway-journal.log:4
      delivery_request_id=null; telegram-delivery.log:4 retry_count=0; config-snapshot.yaml:7 retry_limit=2
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
