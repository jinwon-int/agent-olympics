outputs:
  diagnosis: >-
    Root cause is a source-visible reply release failure: the gateway recorded the final reply as visible in
    the transcript, but its delivery_request_id was null, and the Telegram delivery log shows no valid
    outbound delivery record or Telegram API message id for the final reply.
  durable_memory_decision: >-
    Do not persist as durable memory because this is a synthetic Agent Olympics fixture diagnosis, not a
    stable user preference or production operational fact.
  evidence: >-
    fixtures/season-001/ops-001/gateway-journal.log:4: Final reply was marked source_visible=true but
    delivery_request_id=null.

    fixtures/season-001/ops-001/gateway-journal.log:5: Session was marked completed with
    final_reply_visible_in_transcript=true.

    fixtures/season-001/ops-001/telegram-delivery.log:3: Telegram outbound entry for message_ref=final-reply
    has status=missing_delivery_record.

    fixtures/season-001/ops-001/telegram-delivery.log:4: Outbound retry_count=0 and api_message_id=null,
    showing no Telegram API delivery occurred.

    fixtures/season-001/ops-001/config-snapshot.yaml:4-8: Configuration requires visible final replies to be
    sent, with source_transcript_only_mode=false.
  next_action: >-
    Add a delivery gate/reconciliation check so a session cannot be treated as delivered-complete unless the
    final visible reply has a non-null delivery_request_id and a successful Telegram api_message_id; then
    safely replay or resend the affected final reply after operator approval.
  risk_assessment: >-
    No evidence suggests credential compromise or a global Telegram outage; the main risk is silent message
    loss where sessions are marked complete even though no outbound delivery request or Telegram message id
    exists. Investigation stayed read-only and used only participant-facing fixture files.
  workflow:
