outputs:
  diagnosis: >-
    source-visible reply release failure. runtime이 session transcript에 최종 응답을 source-visible로 기록했지만, Telegram
    outbound delivery request를 생성하지 않음(delivery_request_id=null). config-snapshot.yaml의
    final_reply_requires_visible_send: true 설정상 명시적 delivery trigger가 필요하나, session closeout handler가
    emitDelivery() 또는 equivalent를 호출하지 않은 것으로 판단됨. retry_limit=2로 설정되어 있으나 retry_count=0인 점에서 delivery attempt
    자체가 queue에 진입하지 못했음을 재확인.
  durable_memory_decision: >-
    persist. source_visible과 delivered의 구분은 운영에서 반복 발생 가능한 패턴. 'transcript presence ≠ user delivery' 원칙과
    delivery_request_id=null 체크를 durable memory에 기록하여 향후 유사 incident에서 빠른 triage 가능하도록 함. delivery-probe
    monitoring check를 infrastructure runbook에 추가 제안.
  evidence: >-
    fixtures/season-001/ops-001/gateway-journal.log:4: final_reply source_visible=true
    delivery_request_id=null — 최종 응답이 transcript에는 존재하나 delivery request가 생성되지 않음

    fixtures/season-001/ops-001/telegram-delivery.log:3: status=missing_delivery_record — Telegram outbound
    delivery log에 최종 응답의 delivery record가 존재하지 않음

    fixtures/season-001/ops-001/telegram-delivery.log:4: retry_count=0 api_message_id=null — delivery attempt가
    단 한 번도 시도되지 않았으며 Telegram API message ID가 할당되지 않음

    fixtures/season-001/ops-001/config-snapshot.yaml:5-6: final_reply_requires_visible_send: true,
    retry_limit: 2 — 명시적 delivery trigger가 필요한 구성임에도 retry가 전혀 발생하지 않음

    fixtures/season-001/ops-001/manifest.yaml:16-19: manifest 자체가 'source-visible reply release failure'로 시나리오
    설명 — transcript에는 있지만 실제 outbound delivery evidence는 없음
  next_action: >-
    runtime session closeout handler 코드 감사. final reply가 transcript에 write된 후 delivery pipeline으로 emit되는 code
    path 확인 필요. 구체적으로: (1) session 완료 시 final_reply 객체 생성 후 emitDelivery() 또는 outbound queue enqueue 호출 여부 확인,
    (2) delivery_request_id가 null로 남는 조건 추적, (3) 수정 후 dry-run으로 delivery_request_id != null 및 api_message_id
    할당 확인. monitoring으로 delivery-probe check 추가 권장.
  risk_assessment: >-
    low risk. credential 손상이나 infrastructure 장애가 아닌 runtime code path 버그. delivery pipeline 자체는 정상(gateway
    status no global errors, inbound/typing 정상 처리). session transcript 데이터 손실 없음. fix는 read-verify-then-patch
    접근으로 충분. 현재 incident로 인한 추가 cascading failure 가능성 낮음.
  workflow:
    step_count: 4
    worker_count: 1
    worker_profiles:
      - local-hermes-cli
    workflow_id: wf-ops-001-sogyo-2026-06-11T13-13-11-cd211d
