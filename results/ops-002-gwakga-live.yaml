outputs:
  evidence: >-
    fixtures/season-001/ops-002/manifest.yaml:16-21: Fixture bundle is participant-facing and defines
    comparison of pre/post configuration snapshots to decide reinstall versus targeted repair.

    fixtures/season-001/ops-002/pre-update-config.yaml:6-15: Known-good baseline: restart_policy=on-failure,
    OPENCLAW_HOME=/opt/openclaw, PATH_POLICY=managed, memory_mb=1024, open_files=4096,
    final_reply_timeout_seconds=30.

    fixtures/season-001/ops-002/post-update-config.yaml:6-15: Post-update drift: restart_policy=always,
    PATH_POLICY=reset-by-package-update, memory_mb=512, open_files=1024, final_reply_timeout_seconds=5;
    OPENCLAW_HOME remains /opt/openclaw.

    fixtures/season-001/ops-002/system-status.log:1-5: Status is degraded but systemd unit is active; recent
    package refresh changed unit override and resource limits; observed symptom is final replies timing out
    after 5 seconds.
  installation_integrity_assessment: >-
    [hermes-adapter:orchestrator/ops] Output for installation_integrity_assessment. Status: completed.
    Commander report synthesized.
  recommendation: >-
    [hermes-adapter:orchestrator/ops] Output for recommendation. Status: completed. Commander report
    synthesized.
  rollback_or_noop_rationale: >-
    [hermes-adapter:orchestrator/ops] Output for rollback_or_noop_rationale. Status: completed. Commander
    report synthesized.
  runtime_path: >-
    [hermes-adapter:orchestrator/ops] Output for runtime_path. Status: completed. Commander report
    synthesized.
  workflow:
    step_count: 4
    worker_count: 1
    worker_profiles:
      - local-hermes-cli
    workflow_id: wf-ops-002-gwakga-2026-06-11T16-26-49-caa95b
  mission_parse_fallback: false
  diagnosis: >-
    Root cause is post-update configuration drift, not a corrupted installation. The package refresh changed
    the unit override/resource limits and delivery timeout: restart_policy on-failure became always,
    PATH_POLICY managed became reset-by-package-update, memory_mb 1024 became 512, open_files 4096 became
    1024, and final_reply_timeout_seconds 30 became 5. The 5-second final-reply timeout directly explains
    intermittent Telegram final reply timeouts while systemd remains active and OPENCLAW_HOME stays
    /opt/openclaw.
  risk_assessment: >-
    Clean reinstall would be unnecessary and higher-risk because the evidence points to bounded config drift
    while the runtime path and service activation remain intact. No secrets were inspected, no production
    restart/reload was performed, and no destructive mutation is justified from this fixture. The main
    operational risk is preserving the bad 5-second timeout and reduced limits, causing continued Telegram
    delivery failures.
  next_action: >-
    Perform a targeted configuration restoration to the pre-update baseline values: PATH_POLICY=managed,
    memory_mb=1024, open_files=4096, restart_policy=on-failure, final_reply_timeout_seconds=30. After change
    review/approval, reload or restart the affected service under the operator approval gate and run a
    Telegram final-reply delivery smoke test.
  durable_memory_decision: >-
    Do not persist this synthetic fixture-specific incident as durable memory. If this pattern appears in a
    real node incident, persist the general runbook lesson: compare pre/post runtime config and unit overrides
    before recommending reinstall, especially delivery timeout and resource-limit drift.
