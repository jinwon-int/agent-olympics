    seconds.

    fixtures/season-001/coord-001/shared-evidence.yaml:ev-retry-burst: Retries cluster immediately after
    timeout events.

    fixtures/season-001/coord-001/shared-evidence.yaml:ev-cpu-window: CPU briefly reached 92 percent during
    retry bursts.

    fixtures/season-001/coord-001/shared-evidence.yaml:ev-provider-status: Provider status page reports normal
    operation during the incident window.
  risk_assessment: >-
    Risk is operational degradation from shortened reply timeout causing retry amplification and transient CPU
    saturation. Avoid destructive remediation, credential rotation, or production restarts without approval.
    Provider escalation is low priority unless new direct rejection logs appear.
  next_action: >-
    Assign the service/config owner to prepare an approved rollback or hotfix restoring final reply timeout to
    30 seconds, then run a bounded verification comparing timeout count, retry bursts, final reply delivery,
    and CPU. Assign on-call/SRE to monitor CPU and retries during the change; assign provider liaison only to
    stand by unless direct provider rejection evidence appears.
