    Root cause is the post-update timeout reduction from 30s to 5s. The retry burst evidence places retries
    immediately after timeout events, and the CPU spike occurred during those retry bursts, making CPU
    saturation a symptom/amplifier rather than the initiating cause. Provider-side rejection is not supported
    by the available provider-status evidence.
  evidence: >-
    fixtures/season-001/coord-001/report-agent-a.yaml: Agent A claims CPU saturation caused delivery lag and
    no configuration drift was present, with medium confidence.

    fixtures/season-001/coord-001/report-agent-b.yaml: Agent B claims timeout configuration was reduced from
    30 seconds to 5 seconds and CPU load was a symptom of retry bursts, with high confidence.

    fixtures/season-001/coord-001/report-agent-c.yaml: Agent C raises a minority hypothesis of provider-side
    rejection but only indirect evidence and low confidence.

    fixtures/season-001/coord-001/shared-evidence.yaml:ev-config-before: Baseline final reply timeout was 30
    seconds.

