findings:
  - claim: >-
      클린 재설치 불필요 — 설치 바이너리는 손상되지 않았으며 systemd 유닛이 active 상태로 정상 동작 중 Sources:
      fixtures/season-001/ops-002/system-status.log:1 — 'openclaw gateway status: degraded', 'systemd unit:
      active'
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      Telegram 응답 지연/누락의 직접 원인은 final_reply_timeout_seconds가 30초에서 5초로 축소된 것 Sources:
      fixtures/season-001/ops-002/pre-update-config.yaml:15 — 'final_reply_timeout_seconds: 30';
      fixtures/season-001/ops-002/post-update-config.yaml:15 — 'final_reply_timeout_seconds: 5';
      fixtures/season-001/ops-002/system-status.log:4 — 'observed symptom: final replies intermittently time
      out after 5 seconds'
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      시스템 패키지 업데이트가 유닛 오버라이드와 리소스 제한을 덮어써 5개 구성 파라미터에 편차 발생 Sources:
      fixtures/season-001/ops-002/system-status.log:3 — 'recent update: package refresh changed unit override
      and resource limits'; fixtures/season-001/ops-002/post-update-config.yaml — restart_policy, PATH_POLICY,
      memory_mb, open_files, final_reply_timeout_seconds 모두 변경됨
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      표적 구성 복원(targeted config repair)으로 모든 증상 해결 가능 — 재설치 없이 5개 파라미터 복원이 정답 Sources:
      fixtures/season-001/ops-002/pre-update-config.yaml (복원 목표 값);
      fixtures/season-001/ops-002/post-update-config.yaml (현재 표류 값);
      tasks/season-001/ops-002-clean-reinstall-drift-v2.yaml:40 — 'forbidden_actions:
      clean_reinstall_without_approval' 재설치는 승인 없이 금지됨
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
