name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate source packs and adapters
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:unit

      - name: Run primary validator
        run: npm test

      - name: Run source-only round CI gate
        run: make ci-round

      - name: Run live runner readiness gate fixtures
        run: make live-runner-readiness-check

      - name: Run round engine hardening checks
        run: make round-hardening-check

      - name: Run declaration cross-check fixtures
        run: make declaration-cross-check

      - name: Run proof-token verifier fixtures
        run: make proof-token-verify

      - name: Run full validation suite
        run: make validate

      - name: Run competition-validity full scan
        run: make validate-competition

      - name: Generate scoreboard for publication gates
        run: make score

      - name: Run dry-run finalizer gates
        run: make dry-run-finalizer

      - name: Run stub adapter test suite
        run: bash scripts/test-stub-adapter.sh

      - name: Run web result consumer test suite
        run: bash scripts/test-web-consumer.sh

      - name: Run mission toolsets self-test
        run: npm run test:mission_toolsets

      - name: Run coordination round fixtures
        run: npm run test:coordination_fixtures

      - name: Run judge harness fixtures
        run: make judge-fixtures

      - name: Run live runner fixtures
        run: make live-runner-fixtures

      - name: Report task tier promotion status
        run: make promotion-check

      - name: Check whitespace
        run: git diff --check

      - name: Check committed artifacts are not stale
        # The generate steps above (make score, make dry-run-finalizer, etc.)
        # write regenerable output. Committed "scored record" artifacts must
        # match what the scripts produce — a non-empty diff means a committed
        # artifact drifted from regeneration. See docs/artifact-retention.md.
        run: |
          if ! git diff --exit-code; then
            echo "A committed artifact drifted from regeneration — commit the regenerated output or move it out of the repo (see docs/artifact-retention.md)." >&2
            exit 1
          fi
