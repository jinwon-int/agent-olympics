name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate source packs and adapters
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run primary validator
        run: npm test

      - name: Run source-only round CI gate
        run: make ci-round

      - name: Run live runner readiness gate fixtures
        run: make live-runner-readiness-check

      - name: Run full validation suite
        run: make validate

      - name: Check whitespace
        run: git diff --check
