name: Publish public leaderboard

# Builds the blind (anonymized) leaderboard from the committed scoreboard and
# publishes it to GitHub Pages. Blind mode is mandatory for the public surface:
# participant identities, models, nodes, and hardware are withheld (see
# docs/public-leaderboard.md). Publication is opt-in — it only runs once the
# repository has Pages enabled (Settings -> Pages -> Source: GitHub Actions).

on:
  push:
    branches:
      - main
    paths:
      - 'results/**'
      - 'scripts/web-result-consumer.js'
      - 'scripts/score.js'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight publish; let it finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build blind leaderboard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate scoreboard from committed judge records
        run: make score

      - name: Build the blind leaderboard
        run: node scripts/web-result-consumer.js results/scoreboard.json --blind --output-dir public-site

      - name: Verify no participant identity leaked into the public site
        run: |
          # Fail the publish if any participant id, node, or model label survived
          # blind anonymization. This is a hard gate on the public surface — a
          # leak here is a fairness failure, not a cosmetic one.
          #
          # The blocklist is derived at run time from the authoritative rounds/
          # and results/ data (plus a static vps<N> tail), so newly registered
          # participants/models/nodes are covered automatically. The helper exits
          # non-zero if the derived set is empty, which fails this step rather
          # than letting the gate silently become a no-op.
          blocklist=$(node scripts/identity-blocklist.js --regex) || {
            echo "Identity blocklist derivation failed — refusing to publish." >&2
            exit 1
          }
          echo "Derived identity blocklist: $blocklist"
          leak=$(grep -rEi "$blocklist" public-site || true)
          if [ -n "$leak" ]; then
            echo "Participant identity leaked into the public blind leaderboard:" >&2
            echo "$leak" >&2
            exit 1
          fi
          echo "Blind leaderboard is identity-clean."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check whether Pages publishing is enabled
        id: pages
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const {owner, repo} = context.repo;
              const {data: pages} = await github.request('GET /repos/{owner}/{repo}/pages', {owner, repo});
              const buildType = pages.build_type || 'legacy';
              const enabled = buildType === 'workflow';
              core.setOutput('enabled', enabled ? 'true' : 'false');
              core.setOutput('reason', enabled
                ? `Pages is enabled with GitHub Actions source (${pages.html_url || 'no URL yet'}).`
                : `Pages exists but source is ${buildType}; set Settings → Pages → Source to GitHub Actions to publish.`);
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('enabled', 'false');
                core.setOutput('reason', 'GitHub Pages is not enabled for this repository. Build artifact was verified; deploy skipped intentionally.');
                return;
              }
              throw error;
            }

      - name: Deploy
        id: deployment
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4

      - name: Explain skipped Pages deploy
        if: steps.pages.outputs.enabled != 'true'
        run: |
          echo "${{ steps.pages.outputs.reason }}"
          echo "No public leaderboard was published because repository Pages publishing is disabled or not configured for GitHub Actions."
