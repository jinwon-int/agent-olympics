outputs:
  bug_cause: >-
    Newly registered or not-yet-measured gateway samples can omit metrics, but the TypeScript type and
    aggregation logic assumed metrics was always present.
  changed_files: src/types.ts; src/report.ts; test/report.test.ts
  fix_summary: >-
    Made DeliverySample.metrics optional and updated summarize() to count outcomes/samples for every row while
    only adding latency and retry totals when metrics exists. Added a regression test asserting a metrics-less
    rejected sample produces one summary row with mean_latency_ms null and total_retries 0.
  residual_risk: >-
    Low. The fix is narrowly scoped to missing metrics handling. It does not validate malformed metric shapes
    or non-numeric values because parseSamples remains a lightweight JSON cast; that is unchanged existing
    behavior.
  test_results: >-
    Pre-fix reproduction: npm run report exited 1 with TypeError: Cannot read properties of undefined (reading
    'retries') at summarize (/work/agent-codebench/dist/src/report.js:37:39). Post-fix verification: npm test
    exited 0 with tests 5, pass 5, fail 0. Additional verification: npm run typecheck && npm run report exited
    0 and rendered gw-04 with mean_ms n/a and retries 0.
  workflow:
    step_count: 3
    worker_count: 1
    worker_profiles:
      - local-hermes-cli
    workflow_id: wf-code-001-soonwook-2026-06-13T03-42-20-dce393
  mission_parse_fallback: false
  diagnosis: >-
    The runtime sample data includes a gateway row without a metrics object, but DeliverySample declared
    metrics as required and summarize() unconditionally read s.metrics.retries and s.metrics.latency_ms. That
    caused npm run report to crash with TypeError when it reached the metrics-less sample.
  evidence: >-
    data/samples.json:20-24: The fixture includes gw-04 with node, observed_at, and outcome rejected, but no
    metrics field.

    pre-fix command: npm run report: Exited 1 with TypeError: Cannot read properties of undefined (reading
    'retries') at summarize (/work/agent-codebench/dist/src/report.js:37:39).

    src/types.ts:13-16: DeliverySample.metrics is now optional to match samples whose probe worker has not
    populated measurements yet.

    src/report.ts:33-37: summarize() now checks if (s.metrics) before adding retries and latency, while still
    counting outcomes and samples.

    test/report.test.ts:49-69: Added regression test for a sample without probe metrics, expecting
    mean_latency_ms null and total_retries 0.

    post-fix command: npm test: Exited 0: tests 5, pass 5, fail 0.

    post-fix command: npm run typecheck && npm run report: Exited 0; report output includes gw-04 with samples
    1, rejected 1, mean_ms n/a, retries 0.
  risk_assessment: >-
    Changes are minimal and task-relevant: one interface optionality update, one guarded aggregation block,
    and one focused regression test. No oracle/private files were read, no production actions were taken, and
    no broad formatting or unrelated refactor was performed.
  next_action: Open a PR with the three changed files and the summary/test evidence above.
  durable_memory_decision: >-
    Do not persist durable memory: this is a task-local TypeScript regression fix, not reusable user or fleet
    preference information.
