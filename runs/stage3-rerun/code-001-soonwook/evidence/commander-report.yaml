summary: >-
  Fixed the TypeScript delivery report regression by allowing delivery samples to omit probe metrics until the
  first measurement cycle completes, guarding aggregation against missing metrics, and adding a focused
  regression test for that case. Verified the previously crashing report command now renders the sample with
