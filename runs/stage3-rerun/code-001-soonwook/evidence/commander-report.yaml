diagnosis: >-
  The runtime sample data includes a gateway row without a metrics object, but DeliverySample declared metrics
  as required and summarize() unconditionally read s.metrics.retries and s.metrics.latency_ms. That caused npm
  run report to crash with TypeError when it reached the metrics-less sample.
