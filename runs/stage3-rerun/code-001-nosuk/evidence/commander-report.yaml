summary: >-
  Fixed a regression where the nightly report summarise() function crashed on delivery samples that lack a
  `metrics` field (e.g., rejected messages where the probe worker never ran). The fix makes `metrics` optional
  on the `DeliverySample` type, guards metric access with optional chaining, and adds a targeted test for the
  missing-metrics scenario. The report command now runs successfully against the full samples.json dataset.
diagnosis: >-
  The `summarize()` function in src/report.ts unconditionally read `s.metrics.retries` and
  `s.metrics.latency_ms` for every sample. The `DeliverySample` interface declared `metrics` as required, but
  real-world data (data/samples.json) includes a `gw-04` entry with outcome `rejected` and no `metrics` field
  — the probe worker hadn't measured it. Accessing `.retries` on `undefined` threw `TypeError: Cannot read
  properties of undefined (reading 'retries')`.
risk_assessment: >-
  The fix is minimal, targeted, and fully backward-compatible. Only three source lines changed in the logic
  (one for retries, two for latency guard). The type change from required to optional is semver-compatible
  (widening). No unrelated refactors, no formatting changes, no dependency modifications. Production-safe.
next_action: >-
  The fix is ready for PR. Reviewer should confirm: (a) the `metrics?` type widening doesn't break any
  downstream consumers, (b) the `n/a` rendering plus zero-retries default is the intended behavior for
  metric-less samples, (c) the test covers the edge case and passes in CI.
durable_memory_decision: >-
  No durable memory needed. This is a straightforward code-001 regression fix that is fully documented in the
  test file and the commit would serve as the authoritative record.
