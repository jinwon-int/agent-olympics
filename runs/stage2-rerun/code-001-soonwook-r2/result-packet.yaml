findings:
  - claim: >-
      The crash condition is a missing metrics object on a valid sample, not malformed JSON or a parser
      failure. Sources: /work/agent-codebench/README.md:18-34; /work/agent-codebench/data/samples.json:20-24;
      /work/agent-codebench/src/report.ts:29-35
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      The TypeScript model regressed by requiring metrics even though public documentation says metrics may
      not exist until the first measurement cycle completes. Sources: /work/agent-codebench/src/types.ts:9-16;
      /work/agent-codebench/README.md:28-31; /work/agent-codebench/CHANGELOG.md:3-7
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      The current test suite misses the regression because it only exercises samples that include metrics.
      Sources: /work/agent-codebench/test/report.test.ts:6-47; /work/agent-codebench/README.md:31-34
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
  - claim: >-
      The correct focused fix is to treat metrics as optional during aggregation, still count the
      sample/outcome, and exclude unmeasured samples from latency/retry accumulation so all-unmeasured nodes
      render mean latency as null/n/a. Sources: /work/agent-codebench/src/report.ts:37-45;
      /work/agent-codebench/src/report.ts:51-68; /work/agent-codebench/CHANGELOG.md:8-10
    evidence:
      - ev-commander-report
      - ev-worker-traces
    confidence: high
