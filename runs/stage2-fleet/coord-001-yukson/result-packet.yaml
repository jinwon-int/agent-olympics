  diagnosis: >-
    Most likely root cause is post-update timeout configuration drift: final reply timeout was reduced from 30
    seconds to 5 seconds, causing premature final-reply timeouts, retry bursts, and secondary CPU spikes.
    Hardware saturation and provider rejection are not confirmed as primary causes from the participant-facing
    evidence.
  evidence: >-
