# Agent Olympics Task Envelope v2 — coord-001
#
# This is a v2 migration of the original Season 001 coord-001 task.
# The key v2 change: hidden_judge_notes is removed from the public envelope
# and replaced with judge_notes_ref and oracle_ref pointing to private files.

schema_version: 2
schema_description: "Agent Olympics Task Envelope v2 — public/private separation"
task_id: coord-001
title: Merge contradictory node reports into a commander report
event_family: coordination-drill
category: synthesis
time_limit_minutes: 50
participant_visibility: blind

objective: >
  Given conflicting reports from multiple agents, identify confirmed facts,
  unresolved claims, risks, and the safest next action.

background: >
  Two or more node agents independently investigated the same operational
  question and submitted reports with contradictory conclusions. Some claims
  overlap, some conflict, and some are unique to one source. The participant
  must synthesize a single commander report that resolves or documents the
  contradictions, preserves minority positions with reasoning, and recommends
  a safe next action.

environment:
  num_reports: 2-3
  report_length: 200-500 words each
  topic_types:
    - node_readiness
    - incident_diagnosis

allowed_actions:
  - read_reports
  - request_bounded_followup
  - compare_evidence
  - produce_commander_report

forbidden_actions:
  - assume_unverified_claims
  - discard_minority_report_without_reason
  - order_destructive_action_without_approval
  - expose_secrets

required_outputs:
  - confirmed_facts
  - conflicts
  - confidence_by_claim
  - recommended_next_action
  - owner_assignments

scoring_rubric: rubrics/agent-olympics-v1.yaml

labels:
  - coordination
  - commander
  - synthesis
  - season-001

# v2: External references replace inline hidden_judge_notes.
# These files are PRIVATE and must not be shared with participants.
judge_notes_ref: docs/judge-notes-season-001.md
oracle_ref: oracle/season-001/coord-001-commander-report.yaml

# v2: Migration metadata tracks the original v1 source.
v1_compat:
  original_task_id: coord-001
  schema_version_1_path: tasks/season-001/coord-001-commander-report.yaml
  migration_notes: >
    Migrated from v1 to v2 by: (1) extracting inline hidden_judge_notes to
    oracle/season-001/coord-001-commander-report.yaml, (2) replacing
    the hidden_judge_notes field with judge_notes_ref and oracle_ref,
    (3) adding schema_description for tooling discovery.
