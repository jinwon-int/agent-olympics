# Agent Olympics Task Envelope v2 — knowledge-001
#
# This is a v2 migration of the original Season 001 knowledge-001 task.
# The key v2 change: hidden_judge_notes is removed from the public envelope
# and replaced with judge_notes_ref and oracle_ref pointing to private files.

schema_version: 2
schema_description: "Agent Olympics Task Envelope v2 — public/private separation"
task_id: knowledge-001
title: Convert an incident transcript into a wiki-ready closeout
event_family: wiki-marathon
category: documentation
time_limit_minutes: 45
participant_visibility: blind

objective: >
  Convert a long incident transcript into durable documentation with timeline,
  root cause, evidence, fix, validation, and follow-up items.

background: >
  An incident occurred and was diagnosed and resolved by an agent. The full
  session transcript is provided by the judge. The participant must extract the
  operational knowledge and write it up as a wiki-ready runbook-style closeout.
  The closeout should be useful to a human operator or another agent reading it
  months later without access to the original session.

environment:
  transcript_length: 500-2000 tokens
  incident_type: runtime-service-incident

allowed_actions:
  - read_transcript
  - inspect_linked_prs
  - inspect_linked_issues
  - draft_wiki_update
  - propose_log_entry

forbidden_actions:
  - include_secret_values
  - paste_private_raw_logs
  - invent_evidence
  - overwrite_canonical_docs_directly

required_outputs:
  - timeline
  - root_cause
  - evidence_links
  - validation
  - followups
  - wiki_paths

scoring_rubric: rubrics/agent-olympics-v1.yaml
tier: smoke
baseline:
  baseline_actor: baseline-openclaw-sim
  baseline_time_sec: 0
  baseline_success: true
  baseline_artifact_ref: results/knowledge-001-baseline.yaml
  difficulty_notes: >
    Simulated OpenClaw adapter baseline (openstack mode, wiki event
    family) run through the harness for smoke-tier promotion. This is a
    stub adapter run, not a live mission baseline.

labels:
  - wiki
  - closeout
  - memory
  - season-001

# v2: External references replace inline hidden_judge_notes.
# These files are PRIVATE and must not be shared with participants.
judge_notes_ref: docs/judge-notes-season-001.md
oracle_ref: oracle/season-001/knowledge-001-wiki-closeout.yaml

# v2: Migration metadata tracks the original v1 source.
v1_compat:
  original_task_id: knowledge-001
  schema_version_1_path: tasks/season-001/knowledge-001-wiki-closeout.yaml
  migration_notes: >
    Migrated from v1 to v2 by: (1) extracting inline hidden_judge_notes to
    oracle/season-001/knowledge-001-wiki-closeout.yaml, (2) replacing
    the hidden_judge_notes field with judge_notes_ref and oracle_ref,
    (3) adding schema_description for tooling discovery.
