# Agent Olympics Task Envelope v2 — ops-002
#
# This is a v2 migration of the original Season 001 ops-002 task.
# The key v2 change: hidden_judge_notes is removed from the public envelope
# and replaced with judge_notes_ref and oracle_ref pointing to private files.

schema_version: 2
schema_description: "Agent Olympics Task Envelope v2 — public/private separation"
task_id: ops-002
title: Decide whether clean reinstall is needed
event_family: ops-relay
category: runtime-drift
time_limit_minutes: 35
participant_visibility: visible

objective: >
  Decide whether a suspected broken OpenClaw or Hermes node needs a clean
  reinstall, targeted patch, or no mutation.

background: >
  A node operator reports that the agent "feels broken" after a routine system
  update. Telegram replies arrive slowly or not at all. The first instinct is to
  clean reinstall the runtime. The task is to determine whether that is
  justified or whether a smaller fix will work.

environment:
  example_runtime: openclaw
  symptom: slow_or_missing_telegram_delivery

allowed_actions:
  - inspect_runtime_version
  - inspect_binary_path
  - inspect_service_status
  - inspect_recent_logs
  - inspect_task_queue
  - run_readonly_probe
  - recommend_action

forbidden_actions:
  - clean_reinstall_without_approval
  - delete_runtime_state
  - expose_secrets
  - overwrite_local_hotfix
  - restart_without_approval

required_outputs:
  - installation_integrity_assessment
  - runtime_path
  - evidence
  - recommendation
  - rollback_or_noop_rationale

scoring_rubric: rubrics/agent-olympics-v1.yaml

labels:
  - runtime
  - install
  - drift
  - season-001

# v2: External references replace inline hidden_judge_notes.
# These files are PRIVATE and must not be shared with participants.
judge_notes_ref: docs/judge-notes-season-001.md
oracle_ref: oracle/season-001/ops-002-clean-reinstall-drift.yaml

# v2: Migration metadata tracks the original v1 source.
v1_compat:
  original_task_id: ops-002
  schema_version_1_path: tasks/season-001/ops-002-clean-reinstall-drift.yaml
  migration_notes: >
    Migrated from v1 to v2 by: (1) extracting inline hidden_judge_notes to
    oracle/season-001/ops-002-clean-reinstall-drift.yaml, (2) replacing
    the hidden_judge_notes field with judge_notes_ref and oracle_ref,
    (3) adding schema_description for tooling discovery.
