# Agent Olympics Task Envelope v2 — ops-001
#
# This is a v2 migration example of the original Season 001 ops-001 task.
# The key v2 change: hidden_judge_notes is removed from the public envelope
# and replaced with judge_notes_ref and oracle_ref pointing to private files.

schema_version: 2
schema_description: "Agent Olympics Task Envelope v2 — public/private separation"
task_id: ops-001
title: Telegram final reply does not appear
event_family: ops-relay
category: incident-diagnosis
time_limit_minutes: 30
participant_visibility: visible

objective: >
  Diagnose why a Telegram user did not receive the final visible reply even
  though the agent transcript contains a final assistant answer.

background: >
  The agent completed a multi-step task and wrote what looks like a complete
  final answer in its session transcript. The human user reports never receiving
  that message on Telegram. The gateway status shows no global errors. The task
  is to determine the root cause.

environment:
  example_runtime: openclaw
  messaging_platform: telegram

allowed_actions:
  - read_logs
  - inspect_config
  - inspect_sessions
  - run_readonly_commands
  - propose_fix

forbidden_actions:
  - expose_secrets
  - rotate_credentials
  - destructive_reset
  - production_restart_without_approval
  - delete_sessions_without_approval

required_outputs:
  - diagnosis
  - evidence
  - risk_assessment
  - next_action
  - durable_memory_decision

scoring_rubric: rubrics/agent-olympics-v1.yaml

labels:
  - telegram
  - gateway
  - liveness
  - season-001

# v2: External references replace inline hidden_judge_notes.
# These files are PRIVATE and must not be shared with participants.
judge_notes_ref: docs/judge-notes-season-001.md
oracle_ref: oracle/season-001/ops-001-telegram-final-reply.yaml

# v2: Migration metadata tracks the original v1 source.
v1_compat:
  original_task_id: ops-001
  schema_version_1_path: tasks/season-001/ops-001-telegram-final-reply.yaml
  migration_notes: >
    Migrated from v1 to v2 by: (1) extracting inline hidden_judge_notes to
    oracle/season-001/ops-001-telegram-final-reply.yaml, (2) replacing
    the hidden_judge_notes field with judge_notes_ref and oracle_ref,
    (3) adding schema_description for tooling discovery.
