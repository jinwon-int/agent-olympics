schema_version: 1
task_id: perf-001
title: Measure node throughput on a controlled mission workload
event_family: performance-trial
category: hardware-backed-mission-capacity
time_limit_minutes: 60
participant_visibility: visible
evaluation_focus:
  - mission_execution
  - hardware_capacity
  - resource_efficiency
  - configuration_fitness
objective: >
  Run a fixed, safe workload that approximates real agent mission work and
  report both raw performance and configuration/resource-limit conclusions.
background: >
  The workload should be deterministic and avoid production mutation. It may
  include repository scan, schema validation, targeted test execution, log
  parsing, and multiple independent read-only diagnostics.
environment:
  workload_class: mixed-readonly-agent-work
hardware_profile:
  required_safe_fields:
    - cpu_class
    - memory_gb
    - storage_class
    - os_family
baseline_profile:
  compare_against:
    - same_workload_previous_run
    - hardware_class_median
allowed_actions:
  - run_readonly_commands
  - run_targeted_tests
  - collect_timing_metrics
  - collect_safe_resource_metrics
  - inspect_service_responsiveness
  - summarize_configuration_effects
forbidden_actions:
  - expose_secrets
  - destructive_reset
  - production_restart_without_approval
  - stress_test_without_bounds
  - modify_production_data
required_outputs:
  - workload_summary
  - hardware_profile
  - configuration_profile
  - workload_metrics
  - evidence
  - stability_assessment
  - tuning_recommendations
scoring_rubric: rubrics/agent-olympics-v1.yaml
labels:
  - performance-trial
  - hardware
  - resource-efficiency
  - season-001

# Fixture bundle: controlled workload definition and repo prepared by runner.
# See fixtures/season-001/perf-001/manifest.yaml for preparation details.
fixtures:
  - fixtures/season-001/perf-001/

hidden_judge_notes: |
  ANSWER KEY / JUDGE NOTES (not visible to participant)

  The workload consists of four sequential phases, each timed:

  Phase A: Repository scan
    - `git rev-list --count HEAD` or similar
    - Count files, lines of code
    - Time for completion

  Phase B: Schema validation
    - Validate all YAML/JSON files under schemas/ against their schemas
    - Report pass/fail and count of validated files

  Phase C: Targeted test execution
    - Run any available test suite
    - Record pass/fail count and wall time

  Phase D: Multi-probe parallel diagnostics
    - Run 3-5 independent read-only probes concurrently or sequentially
    - Measure total time vs sequential estimate

  The participant should NOT invent their own workload but execute the
  standard phases. Deviations must be justified.

  Scoring guidance (Performance Trial overlay from rubric):
  - Mission completion (25 pts): Full points if all four phases complete
    within time limit. 15 pts if 3 of 4 complete. 5 pts if 2 or fewer.
    Zero if workload is fabricated without actual execution.
  - Absolute performance (20 pts): Compare wall time, throughput, and
    parallel capacity. A faster node scores higher here. Judges should
    compare against a reference timing (e.g., baseline from a
    4-core/8GB VPS).
  - Resource efficiency (15 pts): CPU and memory usage relative to the
    workload. A node that uses 80% of 16GB for a lightweight scan is
    inefficient. A node that uses 20% of 2GB for the same workload is
    efficient.
  - Stability under load (15 pts): Check whether gateway, messaging, or
    SSH stayed responsive during the workload. If the participant needed
    to reconnect or services became unresponsive, deduct. Full points for
    reporting concrete responsiveness evidence.
  - Evidence quality (10 pts): Metrics must be concrete (specific
    timestamps, command outputs with timing). "Task completed quickly"
    scores 0. "Phase A: 2.3s, Phase B: 1.7s, ..." scores full.
  - Configuration judgment (10 pts): Does the participant identify
    whether resource limits, concurrency settings, or tool choices
    affected performance? Bonus for suggesting specific tuning.
  - Communication (5 pts): Clearly separate raw hardware performance from
    configuration/tuning conclusions.

  Strong answer markers:
  - Reports absolute throughput AND resource efficiency AND service
    stability as separate dimensions
  - Provides specific tuning recommendations tied to observed
    bottlenecks
  - Identifies whether the bottleneck was CPU, memory, I/O, or
    configuration
  - Does NOT conflate hardware strength with setup quality
  - A high-end node should score well on throughput, but a smaller node
    can still score well on tuning, responsiveness, and safe limits
