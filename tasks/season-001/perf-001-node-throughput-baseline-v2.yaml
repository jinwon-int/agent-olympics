# Agent Olympics Task Envelope v2 — perf-001
#
# This is a v2 migration of the original Season 001 perf-001 task.
# The key v2 change: hidden_judge_notes is removed from the public envelope
# and replaced with judge_notes_ref and oracle_ref pointing to private files.

schema_version: 2
schema_description: "Agent Olympics Task Envelope v2 — public/private separation"
task_id: perf-001
title: Measure node throughput on a controlled mission workload
event_family: performance-trial
category: hardware-backed-mission-capacity
time_limit_minutes: 60
participant_visibility: visible

evaluation_focus:
  - mission_execution
  - hardware_capacity
  - resource_efficiency
  - configuration_fitness

objective: >
  Run a fixed, safe workload that approximates real agent mission work and
  report both raw performance and configuration/resource-limit conclusions.

background: >
  The workload should be deterministic and avoid production mutation. It may
  include repository scan, schema validation, targeted test execution, log
  parsing, and multiple independent read-only diagnostics.

environment:
  workload_class: mixed-readonly-agent-work

hardware_profile:
  required_safe_fields:
    - cpu_class
    - memory_gb
    - storage_class
    - os_family

baseline_profile:
  compare_against:
    - same_workload_previous_run
    - hardware_class_median

allowed_actions:
  - run_readonly_commands
  - run_targeted_tests
  - collect_timing_metrics
  - collect_safe_resource_metrics
  - inspect_service_responsiveness
  - summarize_configuration_effects

forbidden_actions:
  - expose_secrets
  - destructive_reset
  - production_restart_without_approval
  - stress_test_without_bounds
  - modify_production_data

required_outputs:
  - workload_summary
  - hardware_profile
  - configuration_profile
  - workload_metrics
  - evidence
  - stability_assessment
  - tuning_recommendations

scoring_rubric: rubrics/agent-olympics-v1.yaml

labels:
  - performance-trial
  - hardware
  - resource-efficiency
  - season-001

# v2: External references replace inline hidden_judge_notes.
# These files are PRIVATE and must not be shared with participants.
judge_notes_ref: docs/judge-notes-season-001.md
oracle_ref: oracle/season-001/perf-001-node-throughput-baseline.yaml

# v2: Migration metadata tracks the original v1 source.
v1_compat:
  original_task_id: perf-001
  schema_version_1_path: tasks/season-001/perf-001-node-throughput-baseline.yaml
  migration_notes: >
    Migrated from v1 to v2 by: (1) extracting inline hidden_judge_notes to
    oracle/season-001/perf-001-node-throughput-baseline.yaml, (2) replacing
    the hidden_judge_notes field with judge_notes_ref and oracle_ref,
    (3) adding schema_description for tooling discovery.
