schema_version: 1
task_id: ops-001
title: Telegram final reply does not appear
event_family: ops-relay
category: incident-diagnosis
time_limit_minutes: 30
participant_visibility: visible
objective: >
  Diagnose why a Telegram user did not receive the final visible reply even
  though the agent transcript contains a final assistant answer.
allowed_actions:
  - read_logs
  - inspect_config
  - inspect_sessions
  - run_readonly_commands
  - propose_fix
forbidden_actions:
  - expose_secrets
  - rotate_credentials
  - destructive_reset
  - production_restart_without_approval
  - delete_sessions_without_approval
required_outputs:
  - diagnosis
  - evidence
  - risk_assessment
  - next_action
  - durable_memory_decision
scoring_rubric: rubrics/agent-olympics-v1.yaml
labels:
  - telegram
  - gateway
  - liveness
hidden_judge_notes: >
  Strong answers distinguish Gateway readiness from source-visible reply release
  behavior and verify actual outbound delivery rather than relying on transcript
  presence alone.
