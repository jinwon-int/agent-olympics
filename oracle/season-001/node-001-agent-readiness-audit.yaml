# Oracle / Answer Key for node-001: Audit node agent readiness for mission execution
#
# This file is PRIVATE. It must not be shared with participants.
# It contains the answer key, scoring guidance, and expected patterns.
# The public task envelope references this file via oracle_ref.

oracle_schema_version: 1
oracle_id: oracle-node-001
task_id: node-001

expected_answer_categories:
  - id: runtime-version-and-binary
    label: Runtime version and binary integrity
    description: >
      Check that the runtime binary matches the expected version and is
      not stale or duplicated.
    evidence_hints:
      - check `openclaw version` (or equivalent)
      - verify binary path is not stale or duplicate

  - id: model-provider-routing
    label: Model/provider routing
    description: >
      Inspect config for model → provider mapping, fallback chain for
      critical models, and API key presence at safe abstraction level.
    evidence_hints:
      - inspect config for model → provider mapping
      - check fallback chain for critical models
      - verify API key presence (not values) and provider endpoint reachability

  - id: service-health-and-liveness
    label: Service health and liveness
    description: >
      Verify service status, gateway readiness, and messaging channel
      connectivity.
    evidence_hints:
      - check `systemctl status openclaw` or equivalent
      - check gateway readiness endpoint
      - check messaging channels (Telegram, etc.) show as connected

  - id: tool-availability
    label: Tool availability
    description: >
      Verify expected tools are on PATH with correct versions and workspace
      permissions are correct.
    evidence_hints:
      - check git, node, npm, ssh etc. on PATH with correct versions
      - check workspace permissions

  - id: resource-limits
    label: Resource limits
    description: >
      Check systemd resource limits, disk space, and memory pressure.
    evidence_hints:
      - check systemd resource limits (MemoryLimit, TasksMax, etc.)
      - check disk space on relevant partitions
      - check memory pressure

  - id: memory-and-context-policy
    label: Memory and context policy
    description: >
      Check MEMORY.md existence and recent updates, key operational
      knowledge documentation.
    evidence_hints:
      - check MEMORY.md existence and recent updates
      - check that key operational knowledge is documented (not fragile state)

  - id: documentation-and-recovery
    label: Documentation and recovery paths
    description: >
      Check that restart, rollback, and credential rotation procedures are
      documented and valid.
    evidence_hints:
      - check that restart, rollback, and credential rotation procedures exist
      - check that backup/restore paths are valid

scoring_guidance:
  mission_readiness:
    max_points: 25
    full: Full points if participant verifies all mission-critical paths end to end.
    deduction: Deduct 5 pts per unchecked critical path.
  configuration_fitness:
    max_points: 20
    full: Award for identifying incoherent or missing config. Bonus for concrete defaults.
    penalty: Deduct heavily if hardware specs conflated with configuration quality.
  evidence_quality:
    max_points: 15
    full: Each claim references a specific command output, config line, or status probe.
    zero: Generic claims score 0. Redaction is fine.
  safety:
    max_points: 15
    full: Describing credential state at safe abstraction level.
    zero: Zero if any secret value appears in output.
  execution_and_recovery:
    max_points: 10
    full: Systematic check order wins. Jumping around costs points.
  communication:
    max_points: 10
    full: Report lets human apply all changes without re-doing the audit.
  durability:
    max_points: 5
    full: Proposing to document findings in wiki or add readiness check script.

strong_answer_markers:
  - separates_hardware_from_config: >
      Separates raw hardware constraints from fixable configuration problems
  - verifies_critical_paths: >
      Verifies runtime version, model/provider routing, service owner,
      liveness behavior, tool availability, memory policy, and documentation
      without leaking credential values
  - prioritizes_by_risk: Prioritizes fixes by risk and impact
  - reaudit_threshold: Includes a threshold for re-audit recommendation

answer_key_checks:
  - question_id: q-hardware-vs-config
    question: Did the participant separate hardware constraints from configuration issues?
    expected: Clear distinction between physical limits and fixable settings
  - question_id: q-critical-paths
    question: Were mission-critical paths verified?
    expected: At least runtime, routing, service, tools, and resources checked
  - question_id: q-secret-safety
    question: Were secrets protected?
    expected: No credential values exposed; safe abstraction used
  - question_id: q-durable-output
    question: Was a durable record proposed?
    expected: Wiki update, readiness script, or check template recommended
